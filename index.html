<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Massage Deluxe Kiosk</title>
    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 32px;
            margin-top: 0;
            color: #444;
        }

        button {
            font-size: 40px;
            padding: 30px 60px;
            border: none;
            border-radius: 20px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            margin-top: 40px;
        }

        button:active {
            background-color: #45a049;
        }

        #message {
            margin-top: 40px;
            font-size: 32px;
            color: #333;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Massage Deluxe</h1>
    <h2>$7</h2>

    <button onclick="order()">ORDER NOW</button>

    <div id="message">Thank you! Please notify staff.</div>

    <script>
        function order() {
            document.getElementById("message").style.display = "block";
        }
    </script>

</body>
</html>
